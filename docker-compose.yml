version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: packetquest
      MYSQL_USER: pquser
      MYSQL_PASSWORD: pqpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/packetquest
      SPRING_DATASOURCE_USERNAME: pquser
      SPRING_DATASOURCE_PASSWORD: pqpassword
    depends_on:
      mysql:
        condition: service_healthy

  simulator:
    build: ./simulator
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
